#------------------------------------------------------------------------------
# FILE LOCATIONS
#------------------------------------------------------------------------------

#data_directory = 'ConfigDir'
#hba_file = 'ConfigDir/pg_hba.conf'
#ident_file = 'ConfigDir/pg_ident.conf'
#external_pid_file = ''


#------------------------------------------------------------------------------
# CONNECTIONS AND AUTHENTICATION
#------------------------------------------------------------------------------

listen_addresses = '*'
max_connections = 100
password_encryption = md5


#------------------------------------------------------------------------------
# RESOURCE USAGE (except WAL)
#------------------------------------------------------------------------------

# Memory — tuned for a shared 64GB server
shared_buffers            = 2GB      # ~3% of host RAM
work_mem                  = 16MB     # per sort/hash; generous values were exhausting /dev/shm under concurrent tile requests
maintenance_work_mem      = 4GB      # spikes during import/VACUUM, then released
effective_cache_size      = 8GB      # planner hint only

huge_pages                = try
dynamic_shared_memory_type = posix

# Parallelism — kept low to avoid /dev/shm exhaustion under concurrent tile requests
max_parallel_workers_per_gather = 1
max_parallel_workers            = 4


#------------------------------------------------------------------------------
# WRITE-AHEAD LOG
#------------------------------------------------------------------------------

# fsync off: crash recovery is a manual reimport anyway
fsync                        = off
synchronous_commit           = off
full_page_writes             = off

# minimal WAL: skips row-level WAL for bulk COPY/CREATE operations during import
wal_level                    = minimal
max_wal_senders              = 0

max_wal_size                 = 16GB
min_wal_size                 = 1GB
checkpoint_completion_target = 0.9
checkpoint_timeout           = 1h    # large import generates WAL faster than checkpoint can keep up


#------------------------------------------------------------------------------
# QUERY TUNING
#------------------------------------------------------------------------------

random_page_cost          = 1.1      # SSD
effective_io_concurrency  = 200      # SSD
jit                       = off


#------------------------------------------------------------------------------
# REPORTING AND LOGGING
#------------------------------------------------------------------------------

log_timezone = 'Etc/UTC'


#------------------------------------------------------------------------------
# VACUUMING
#------------------------------------------------------------------------------

autovacuum                   = on
autovacuum_vacuum_cost_delay = 2ms   # faster autovacuum on SSD
autovacuum_worker_slots      = 16


#------------------------------------------------------------------------------
# CLIENT CONNECTION DEFAULTS
#------------------------------------------------------------------------------

datestyle = 'iso, mdy'
timezone  = 'Etc/UTC'

lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric  = 'en_US.utf8'
lc_time     = 'en_US.utf8'

default_text_search_config = 'pg_catalog.english'


