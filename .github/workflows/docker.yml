name: Deploy docker image

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "src/**"
      - "quadlet/**"
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
      - name: Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
      - name: Deploy
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          set -euox pipefail
          install -m 600 /dev/null /tmp/deploy_key
          echo "$DEPLOY_SSH_KEY" > /tmp/deploy_key
          tailscale status --peers

          SSH="ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no app@box.reindeer-neon.ts.net"

          # Substitute the image tag in the container file before copying
          sed "s|ghcr.io/dzfranklin/plantopo-osm-db:.*|ghcr.io/${{ github.repository }}:${IMAGE_TAG}|" \
            quadlet/osm-db.container > /tmp/osm-db.container

          rsync -az \
            -e "ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no" \
            /tmp/osm-db.container \
            quadlet/osm-db.volume \
            app@box.reindeer-neon.ts.net:/home/app/.config/containers/systemd/

          $SSH "systemctl --user daemon-reload && systemctl --user restart osm-db"
